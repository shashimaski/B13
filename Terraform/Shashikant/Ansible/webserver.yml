---
- name: Deploy Application
  hosts: webservers
  become: yes

  tasks:
    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Start Apache
      service:
        name: apache2
        state: started

    - name: Copy WAR file
      copy:
        src: amazon.war
        dest: /var/lib/tomcat10/webapps/amazon.war
