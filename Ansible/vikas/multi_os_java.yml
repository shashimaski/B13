---
- name: Install Java on Multiple Operating Systems
  hosts: all
  become: yes

  tasks:

    - name: Install Java on Ubuntu
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: Install Java on RHEL/CentOS
      yum:
        name: java-17-openjdk
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install Java on Windows
      win_chocolatey:
        name: openjdk
        state: present
      when: ansible_os_family == "Windows"
