---
- name: Install Java, download the tomcat, copy Amazon.war and start the tomcat.
  hosts: client servers
  become: true
  vars:
    java package: openjdk-11-jdk
    tomcat URL: https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.85/bin/apache-tomcat-9.0.85.tar.gz
    tomcat path: /opt/tomcat
    war File: Amazon.war
  tasks:
    - name: Install Java
      apt:
        name: "{{ java_package }}"
        state: present
        update_cache: yes
    - name: Create Tomcat Directory
      file:
        path: "{{ tomcat_path }}"
        state: directory
        mode: "0755"
    - name: Download Tomcat
      shell: wget "{{ tomcat_URL }} -0/tmp/apache-toncat.tar.gz
    - name: Extract Tomcat
      unarchive:
        src: /tmp/apache-tomcat.tar.gz
        dest: "{{ tomcat_path }}"
        remote src: true
        extra_opts: ---strip-components=1
    - name: Give execute permission to Tomcat scripts
      file:
        path: "{{ tomcat_path }}/bin/startup.sh"
        mode: "0755"
    - name: Copy Amazon.war file
      copy:
        src: "{{ war_file }}"
        dest: "{{ tomcat_path }}/webapps/{{ war_file }}"
        mode: "0644"
    - name: Start Tomcat
      shell: "{{ tomcat_path }}/bin/startup.sh"
